name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK via Bubblewrap
        run: |
          # 1. Pre-configure Bubblewrap to avoid interactive setup
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Run init using the LOCAL manifest file to avoid URL fetch errors
          mkdir build-android
          cd build-android
          yes | bubblewrap init --manifest=../public/manifest.json
          
          # 3. Build the APK without signing (for testing/debug)
          # We use 'yes' to handle any final confirmation prompts
          yes | bubblewrap build --skipSigning
        continue-on-error: true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Globlync-APK
          path: build-android/*.apk